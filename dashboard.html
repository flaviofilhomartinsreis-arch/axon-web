<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Axon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep-blue: #0a0a5e; 
            --primary-header: #08084d;
            --axon-green: #84bd00;
            --text-white: #ffffff;
            --danger-red: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-deep-blue); margin: 0; color: var(--text-white); }
        header { background: var(--primary-header); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .header-logo { height: 35px; background: white; padding: 5px; border-radius: 4px; }
        .btn-logout { background: rgba(255,255,255,0.1); color: white; border: 1px solid white; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        main { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .table-container { background: white; color: #1e293b; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.8rem; color: #64748b; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .vencido { color: var(--danger-red); font-weight: bold; }
        .btn-action { color: var(--axon-green); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="nova_logo_axon.png" class="header-logo" alt="Axon">
    <button class="btn-logout" onclick="sair()">Sair</button>
</header>

<main>
    <h1 id="userName">Carregando...</h1>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Documento</th>
                    <th>Empresa</th>
                    <th>Vencimento</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="listaDocs"></tbody>
        </table>
    </div>
</main>

<script>
    const _supabase = supabase.createClient(
        'https://fhqobgnyiprnkvqspjbg.supabase.co', 
        'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4'
    );

    // PROTEÇÃO DE ROTA
    const session = JSON.parse(localStorage.getItem("axon_session"));
    if (!session) {
        window.location.assign("index.html");
    } else {
        document.getElementById('userName').innerText = `Painel: ${session.empresa_vinculada}`;
        carregarDocumentos();
    }

    async function carregarDocumentos() {
        const { data, error } = await _supabase.from('clientes_conformidade').select('*');
        const corpoTabela = document.getElementById('listaDocs');
        
        if (error) { console.error(error); return; }

        data.forEach(doc => {
            const dataVenc = new Date(doc.vencimento);
            const isVencido = dataVenc < new Date();
            
            corpoTabela.innerHTML += `
                <tr>
                    <td>${doc.documento}</td>
                    <td>${doc.empresa}</td>
                    <td class="${isVencido ? 'vencido' : ''}">${dataVenc.toLocaleDateString('pt-BR')}</td>
                    <td><a href="${doc.url_documento}" target="_blank" class="btn-action">Ver PDF</a></td>
                </tr>
            `;
        });
    }

    function sair() {
        localStorage.clear();
        window.location.assign("index.html");
    }
</script>
</body>
</html>
