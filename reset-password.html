<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha | Axon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #020240; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 4px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        #msg { margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Definir Nova Senha</h2>
        <p>Digite sua nova senha abaixo para a plataforma Axon.</p>
        <input type="password" id="newPassword" placeholder="Nova Senha">
        <button onclick="atualizarSenha()">Confirmar Nova Senha</button>
        <div id="msg"></div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fhqobgnyiprnkvqspjbg.supabase.co', 'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4');

        async function atualizarSenha() {
            const new_password = document.getElementById('newPassword').value;
            const msg = document.getElementById('msg');
            
            const { data, error } = await _supabase.auth.updateUser({ password: new_password });

            if (error) {
                msg.style.color = 'red';
                msg.innerText = "Erro: " + error.message;
            } else {
                msg.style.color = 'green';
                msg.innerText = "Senha atualizada! Redirecionando...";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            }
        }
    </script>
</body>
</html>
