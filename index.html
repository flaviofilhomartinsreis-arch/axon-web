<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon - Portal de Engenharia</title>
    <!-- Importação da biblioteca oficial do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --azul: #1d4363; --verde: #84bd00; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .logo-img { max-width: 150px; margin-bottom: 1rem; }
        h2 { color: var(--azul); margin-bottom: 1.5rem; font-size: 1.2rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--verde); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #71a300; }
        #msg { color: #d9534f; font-size: 0.85rem; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- A imagem deve estar na mesma pasta no GitHub -->
        <img src="nova_logo_axon.png" alt="Axon Logo" class="logo-img">
        <h2>Portal de Gestão SST</h2>
        <input type="email" id="email" placeholder="E-mail cadastrado">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="login()">Entrar no Sistema</button>
        <div id="msg"></div>
    </div>

    <script>
        // Configurações extraídas do seu painel Supabase
        const supabaseUrl = 'https://fhqobgnyiprnkvqspjbg.supabase.co';
        const supabaseKey = 'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4';
        
        // Inicializa o cliente Supabase
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const emailValue = document.getElementById('email').value;
            const passwordValue = document.getElementById('password').value;
            const msgElement = document.getElementById('msg');

            // Limpa mensagens anteriores e avisa que está processando
            msgElement.innerText = "Verificando...";
            console.log("Iniciando tentativa de login para:", emailValue);

            try {
                // Consulta a tabela usuarios_axon
                const { data, error } = await _supabase
                    .from('usuarios_axon')
                    .select('*')
                    .eq('email', emailValue)
                    .eq('senha_acesso', passwordValue)
                    .single();

                if (error) {
                    console.error("Erro na consulta:", error.message);
                    msgElement.innerText = "Credenciais inválidas ou erro de conexão.";
                    return;
                }

                if (data) {
                    console.log("Login autorizado para:", data.empresa_vinculada);
                    // Salva a sessão localmente para usar no dashboard
                    localStorage.setItem("axon_session", JSON.stringify(data));
                    // Redireciona para o painel principal
                    window.location.href = "dashboard.html";
                } else {
                    msgElement.innerText = "Usuário não encontrado.";
                }

            } catch (err) {
                console.error("Erro inesperado:", err);
                msgElement.innerText = "Erro técnico ao acessar o portal.";
            }
        }
    </script>
</body>
</html>
