<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon - Portal de Gestão SST</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1d4363;
            --axon-green: #84bd00;
            --axon-green-hover: #71a300;
            --bg-page: #f0f4f8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(29, 67, 99, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Container Especial para a Logo */
        .logo-box {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid #f0f4f8;
        }

        .logo-img {
            max-width: 180px;
            height: auto;
            display: block;
        }

        h2 {
            color: var(--primary-blue);
            font-size: 1.4rem;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: var(--axon-green);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(132, 189, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--axon-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(132, 189, 0, 0.2);
        }

        button:hover {
            background: var(--axon-green-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(132, 189, 0, 0.3);
        }

        #msg {
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ef4444;
            min-height: 20px;
        }

        .footer-text {
            margin-top: 35px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="nova_logo_axon.png" alt="Axon Engenharia" class="logo-img">
        </div>
        
        <h2>Portal de Gestão SST</h2>
        
        <div class="input-group">
            <label>E-mail Corporativo</label>
            <input type="email" id="email" placeholder="seu@email.com.br">
        </div>

        <div class="input-group">
            <label>Senha de Acesso</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button id="btnEntrar">Acessar Sistema</button>
        
        <div id="msg"></div>

        <p class="footer-text">Axon Engenharia e Segurança do Trabalho &copy; 2026</p>
    </div>

    <script>
        const supabaseUrl = 'https://fhqobgnyiprnkvqspjbg.supabase.co';
        const supabaseKey = 'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            msg.style.color = "#1d4363";
            msg.innerText = "Verificando...";

            try {
                const { data, error } = await _supabase
                    .from('usuarios_axon')
                    .select('*')
                    .eq('email', email)
                    .eq('senha_acesso', pass)
                    .single();

                if (error || !data) {
                    msg.style.color = "#ef4444";
                    msg.innerText = "Credenciais incorretas.";
                    return;
                }

                localStorage.setItem("axon_session", JSON.stringify(data));
                window.location.href = "dashboard.html";

            } catch (e) {
                msg.innerText = "Falha na conexão com o servidor.";
            }
        }

        document.getElementById('btnEntrar').addEventListener('click', login);
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
