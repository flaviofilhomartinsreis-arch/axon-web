<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Axon | Inteligência em Engenharia e Segurança do Trabalho</title>
    <meta name="description" content="Plataforma de gestão integrada para conformidade legal, SST e engenharia especializada.">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep-blue: #020240; 
            --axon-blue-action: #007bff;
            --text-white: #ffffff;
            --input-bg: #f0f4f9;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-deep-blue);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Logo Reduzida para não espremer a tela */
        .logo-container {
            text-align: center;
            margin-bottom: 5px; /* Reduzido significativamente */
        }

        .logo-img {
            max-width: 180px; /* Reduzido de 260px para 180px */
            height: auto;
            filter: invert(1) brightness(100%);
            mix-blend-mode: screen;
        }

        .sub-title {
            color: var(--text-white);
            font-size: 1.3rem; /* Levemente menor para harmonia */
            font-weight: 300;
            margin-bottom: 25px; /* Reduzido para aproximar do card */
            text-align: center;
        }

        /* Card de Login com proporções equilibradas */
        .login-card {
            background: white;
            padding: 40px 35px;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
            z-index: 2;
        }

        .input-group {
            margin-bottom: 12px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.95rem;
            background-color: var(--input-bg);
            box-sizing: border-box;
            color: #495057;
        }

        input:focus {
            outline: none;
            border-color: var(--axon-blue-action);
            background-color: #fff;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 14px;
            cursor: pointer;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .btn-access {
            width: 100%;
            padding: 12px;
            background-color: var(--axon-blue-action);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-access:hover {
            background-color: #0056b3;
        }

        .forgot-link {
            display: inline-block;
            margin-top: 25px;
            color: #00a8ff;
            text-decoration: none;
            font-size: 0.85rem;
        }

        #msg {
            margin-top: 15px;
            font-size: 0.85rem;
            min-height: 20px;
        }

        /* Rodapé Fixo nas extremidades - Padrão Data Life */
        .footer-bar {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="nova_logo_axon.png" alt="Axon Engenharia" class="logo-img">
    </div>
    
    <div class="sub-title">Gestão de Engenharia e Segurança</div>
    
    <div class="login-card">
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail Corporativo">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Senha de Acesso">
            <i class="fas fa-eye toggle-password" id="eyeIcon"></i>
        </div>

        <button class="btn-access" id="btnEntrar">Entrar no Sistema</button>
        
        <a href="#" class="forgot-link">Esqueceu sua senha?</a>
        
        <div id="msg"></div>
    </div>

    <!-- Rodapé conforme solicitado -->
    <div class="footer-bar">
        <span>suporte@axonengenharia.com.br</span>
        <span>v3.0.0</span>
    </div>

    <script>
        const supabaseUrl = 'https://fhqobgnyiprnkvqspjbg.supabase.co';
        const supabaseKey = 'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const eyeIcon = document.getElementById('eyeIcon');
        const passwordInput = document.getElementById('password');

        eyeIcon.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            msg.style.color = "rgba(255,255,255,0.6)";
            msg.innerText = "Autenticando...";

            try {
                const { data, error } = await _supabase
                    .from('usuarios_axon')
                    .select('*')
                    .eq('email', email)
                    .eq('senha_acesso', pass)
                    .single();

                if (error || !data) {
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "Credenciais inválidas.";
                    return;
                }

                localStorage.setItem("axon_session", JSON.stringify(data));
                window.location.href = "dashboard.html";

            } catch (e) {
                msg.innerText = "Erro de conexão.";
            }
        }

        document.getElementById('btnEntrar').addEventListener('click', login);
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
