<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon | Login Inteligente</title>
    <!-- Bibliotecas e Fontes -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep-blue: #020240; 
            --axon-blue-action: #007bff;
            --text-white: #ffffff;
            --input-bg: #f0f4f9;
            --error-red: #ff4d4d;
            --success-green: #2ecc71;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-deep-blue);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px 35px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .logo-img { max-width: 180px; margin-bottom: 20px; filter: invert(1) brightness(100%); mix-blend-mode: screen; }
        
        .input-group { margin-bottom: 15px; position: relative; width: 100%; }
        
        input {
            width: 100%;
            padding: 14px;
            padding-right: 45px; /* Espaço para o olho */
            border: 1px solid #ced4da;
            border-radius: 4px;
            background: var(--input-bg);
            box-sizing: border-box;
            font-size: 1rem;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            z-index: 10;
        }

        .btn-access {
            width: 100%;
            padding: 14px;
            background: var(--axon-blue-action);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-access:hover { background: #0056b3; }

        #msg { margin-top: 15px; font-size: 0.9rem; font-weight: 600; min-height: 20px; }
        .forgot-link { display: block; margin-top: 20px; color: var(--axon-blue-action); text-decoration: none; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <img src="nova_logo_axon.png" alt="Axon" class="logo-img">
    
    <div class="login-card">
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail Corporativo" autocomplete="email">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Senha de Acesso">
            <i class="fas fa-eye toggle-password" id="eyeIcon"></i>
        </div>
        <button class="btn-access" onclick="login()">Entrar no Sistema</button>
        <div id="msg"></div>
        <a class="forgot-link" onclick="recuperarSenha()">Esqueceu sua senha?</a>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://fhqobgnyiprnkvqspjbg.supabase.co', 
            'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4'
        );

        // Lógica do Olhinho (Mostrar/Esconder Senha)
        document.getElementById('eyeIcon').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                this.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                this.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (!email || !password) {
                msg.style.color = "var(--error-red)";
                msg.innerText = "Preencha todos os campos.";
                return;
            }

            msg.style.color = "#666";
            msg.innerText = "Autenticando...";

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msg.style.color = "var(--error-red)";
                msg.innerText = "Erro: " + error.message;
            } else {
                // Sincronização com o Dashboard
                const sessionData = {
                    email: data.user.email,
                    empresa_vinculada: "Axon Engenharia", 
                    nivel_acesso: "admin"
                };
                localStorage.setItem("axon_session", JSON.stringify(sessionData));

                msg.style.color = "var(--success-green)";
                msg.innerText = "Acesso autorizado! Redirecionando...";
                setTimeout(() => window.location.assign("dashboard.html"), 1000);
            }
        }

        async function recuperarSenha() {
            const email = document.getElementById('email').value.trim();
            if (!email) { alert("Digite o e-mail primeiro no campo correspondente."); return; }
            
            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://flaviofilhomartinsreis-arch.github.io/axon-web/reset-password.html',
            });
            alert(error ? error.message : "Link de recuperação enviado com sucesso!");
        }

        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
