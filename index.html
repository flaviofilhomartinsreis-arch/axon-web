<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon | Inteligência em Engenharia e Segurança do Trabalho</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep-blue: #020240; 
            --axon-blue-action: #007bff;
            --text-white: #ffffff;
            --input-bg: #f0f4f9;
            --error-red: #ff4d4d;
            --success-green: #2ecc71;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-deep-blue);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .logo-img {
            max-width: 180px;
            filter: invert(1) brightness(100%);
            mix-blend-mode: screen;
        }
        .sub-title {
            color: var(--text-white);
            font-size: 1.3rem;
            font-weight: 300;
            margin: 10px 0 25px;
            text-align: center;
        }
        .login-card {
            background: white;
            padding: 40px 35px;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
            z-index: 2;
        }
        .input-group { margin-bottom: 12px; position: relative; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.95rem;
            background-color: var(--input-bg);
            box-sizing: border-box;
            color: #495057;
        }
        input:focus { outline: none; border-color: var(--axon-blue-action); background-color: #fff; }
        .toggle-password {
            position: absolute; right: 15px; top: 14px; cursor: pointer; color: #6c757d; font-size: 0.9rem;
        }
        .btn-access {
            width: 100%;
            padding: 12px;
            background-color: var(--axon-blue-action);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .forgot-link {
            display: inline-block;
            margin-top: 25px;
            color: #00a8ff;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
        }
        #msg { margin-top: 15px; font-size: 0.85rem; min-height: 20px; font-weight: 600; }
        .footer-bar {
            position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; color: rgba(255,255,255,0.4); font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="nova_logo_axon.png" alt="Axon Engenharia" class="logo-img">
    </div>
    
    <div class="sub-title">Gestão de Engenharia e Segurança</div>
    
    <div class="login-card">
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail Corporativo">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Senha de Acesso">
            <i class="fas fa-eye toggle-password" id="eyeIcon"></i>
        </div>

        <button class="btn-access" onclick="login()">Entrar no Sistema</button>
        
        <a class="forgot-link" onclick="recuperarSenha()">Esqueceu sua senha?</a>
        
        <div id="msg"></div>
    </div>

    <div class="footer-bar">
        <span>suporte@axonengenharia.com.br</span>
        <span>v3.0.0</span>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://fhqobgnyiprnkvqspjbg.supabase.co', 
            'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4'
        );

        // Olho da senha
        document.getElementById('eyeIcon').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        });

        // Função de Login Nativa
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            msg.style.color = "rgba(0,0,0,0.5)";
            msg.innerText = "Autenticando...";

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                msg.style.color = "var(--error-red)";
                msg.innerText = "E-mail ou senha incorretos.";
            } else {
                window.location.href = "dashboard.html";
            }
        }

        // Recuperação de Senha via E-mail
        async function recuperarSenha() {
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('msg');

            if (!email) {
                msg.style.color = "var(--error-red)";
                msg.innerText = "Digite seu e-mail para receber o link.";
                return;
            }

            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html',
            });

            if (error) {
                msg.style.color = "var(--error-red)";
                msg.innerText = "Erro: " + error.message;
            } else {
                msg.style.color = "var(--success-green)";
                msg.innerText = "E-mail de recuperação enviado!";
            }
        }

        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
