<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Axon | Inteligência em Engenharia e Segurança do Trabalho</title>
    <meta name="description" content="Plataforma de gestão integrada para conformidade legal, SST e engenharia especializada.">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep-blue: #0a0a5e; 
            --axon-green: #84bd00;
            --axon-green-hover: #71a300;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep-blue);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ajuste da Logo para Texto Branco e Integração */
        .logo-box {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            display: block;
            /* Inverte as cores escuras para branco e mistura com o fundo */
            filter: invert(1) brightness(2);
            mix-blend-mode: screen;
        }

        .portal-title {
            color: var(--text-white);
            font-size: 1.4rem;
            margin: 0 0 30px 0;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .login-card {
            background: white;
            padding: 45px 40px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            z-index: 2;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
            background-color: white;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 16px;
            cursor: pointer;
            color: #6b7280;
            z-index: 10;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        #msg {
            margin-top: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            min-height: 20px;
        }

        /* Rodapé posicionado na base da tela (Estilo Datalife) */
        .footer-info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="nova_logo_axon.png" alt="Axon Engenharia" class="logo-img">
    </div>
    
    <h1 class="portal-title">Gestão de Engenharia e Segurança</h1>
    
    <div class="login-card">
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail Corporativo">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Senha de Acesso">
            <i class="fas fa-eye toggle-password" id="eyeIcon"></i>
        </div>

        <button id="btnEntrar">Entrar no Sistema</button>
        
        <div id="msg"></div>
    </div>

    <!-- Rodapé conforme solicitado -->
    <div class="footer-info">
        <span>suporte@axonengenharia.com.br</span>
        <span>v3.0.0</span>
    </div>

    <script>
        const supabaseUrl = 'https://fhqobgnyiprnkvqspjbg.supabase.co';
        const supabaseKey = 'sb_publishable_QlhA74Sf-RpMHyopN6Ftow_g3UvFNp4';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const eyeIcon = document.getElementById('eyeIcon');
        const passwordInput = document.getElementById('password');

        eyeIcon.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            msg.style.color = "rgba(255,255,255,0.8)";
            msg.innerText = "Autenticando...";

            try {
                const { data, error } = await _supabase
                    .from('usuarios_axon')
                    .select('*')
                    .eq('email', email)
                    .eq('senha_acesso', pass)
                    .single();

                if (error || !data) {
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "Credenciais inválidas.";
                    return;
                }

                localStorage.setItem("axon_session", JSON.stringify(data));
                window.location.href = "dashboard.html";

            } catch (e) {
                msg.innerText = "Erro de conexão.";
            }
        }

        document.getElementById('btnEntrar').addEventListener('click', login);
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
